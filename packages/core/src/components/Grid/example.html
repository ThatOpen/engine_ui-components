<!DOCTYPE html>
<html lang="en" class="bim-ui-dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid</title>
  <style>
    * {
      margin: 0;
      box-sizing: border-box;
    }

    html {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--bim-ui_bg-base);
      background-image:
        linear-gradient(var(--bim-ui_bg-contrast-20) 1px, transparent 1px),
        linear-gradient(90deg, var(--bim-ui_bg-contrast-20) 1px, transparent 1px);
      background-size: 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    bim-grid[:not(layout)] {
      background-color: transparent;
    }

    bim-grid {
      gap: 0.75rem;
      padding: 1rem;
    }

    bim-viewport>bim-grid {
      padding: 0;
    }

    bim-button {
      flex: 0;
    }

    bim-panel,
    bim-panel-section,
    bim-tabs:not([floating]),
    bim-toolbar:not(bim-tabs bim-toolbar),
    bim-viewport {
      border-radius: var(--bim-ui_size-base);
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- <bim-button label="Change Layout" icon="mingcute:layout-fill"></bim-button> -->
  <bim-grid areas-resizeable layout="app">
    <bim-label slot="not-allowed">You're not allowed to see this page</bim-label>
    <bim-label slot="not-found">404</bim-label>
    <bim-label slot="empty-layout">Nothing here</bim-label>
  </bim-grid>
  <script type="module" src="./example.ts"></script>
</body>

</html>
