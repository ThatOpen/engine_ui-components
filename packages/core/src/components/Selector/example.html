<!DOCTYPE html>
<html lang="en" class="bim-ui-dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selector</title>
  <style>
    html {
      font-family: sans-serif;
    }

    body {
      background-color: var(--bim-ui_bg-base);
    }

    bim-selector {
      width: 26rem;
    }
  </style>
</head>

<body>
  <bim-selector label="Camera Projection">
    <bim-option icon="solar:settings-bold" label="Orthographic" value="0" checked></bim-option>
    <bim-option label="Perspective" value="1"></bim-option>
    <bim-option label="Custom"></bim-option>
  </bim-selector>

  <h3 style="color: var(--bim-ui_bg-contrast-80); margin-top: 2rem"> </h3>
  <bim-selector variant="underline" style="width: 26rem">
    <bim-option label="Models" checked></bim-option>
    <bim-option label="Objects"></bim-option>
    <bim-option label="Structure"></bim-option>
  </bim-selector>

  <script type="module" src="./example.ts"></script>
</body>

</html>
